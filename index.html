<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Converter</title>
    <link rel="stylesheet" href="style.css">
    
</head>


<body>

    <div class="container">
        <div class="box">
            <h1>Temperature Converter</h1>
            <div class="input">
                <p>Enter Temperature</p>
                <input type="number" id="temp" placeholder="Enter the Temperature">

                    <div class="container2">
                        <div class="Bigbox1">
                            <p>From</p>
                            <select class="box1" id="Fromunit">
                                <option value="Celsius">Celsius(&#176C)</option>
                                <option value="Kelvin">Kelvin(&#176K)</option>
                                <option value="Fahrenheit">Fahrenheit(&#176F)</option>
                            </select>
                        </div>
                        <div class="swap-icon">&#8646;</div>
                        <div class="Bigbox2">
                            <P>to</P>
                            <select class="box1" id="Tounit">
                                <option value="Kelvin">Kelvin(&#176K)</option>
                                <option value="Celsius">Celsius(&#176C)</option>
                                <option value="Fahrenheit">Fahrenheit(&#176F)</option>
                            </select>
                        </div>
                    </div>
            <div class="container3"><br>
                <button id="convert">Convert</button>
            </div>
            <div class="container4"><br>

            </div>

                </div>
            </div>
        </div>
    </div>



    <script src="script.js"></script>
</body>

</html>
